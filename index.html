      /* Custom Scrollbar for sleek look */

      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;

      }
      ::-webkit-scrollbar-thumb:hover {

      .card-stack-enter {

        transition: all 300ms ease-out;
      }
